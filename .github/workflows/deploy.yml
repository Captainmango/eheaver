name: Deploy to Surge

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --strict-peer-deps=false

      - name: Build
        run: npm run build

      - name: Deploy to Surge
        uses: dswistowski/surge-sh-action@v1
        with:
          domain: eheaver.surge.sh
          project: dist
          login: ${{ secrets.SURGE_LOGIN }}
          token: ${{ secrets.SURGE_TOKEN }}
